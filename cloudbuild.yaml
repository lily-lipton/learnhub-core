# Cloud Build トリガー用 — main への push で Cloud Run へデプロイ

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/learnhub-core:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/learnhub-core:$COMMIT_SHA

  # --iap を毎回付ける（省略すると更新デプロイで IAP が外れることがある）
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - learnhub-core
      - --image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/learnhub-core:$COMMIT_SHA
      - --region=asia-northeast1
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --max-instances=1
      - --no-allow-unauthenticated
      - --iap
      - --project=$PROJECT_ID

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/learnhub-core:$COMMIT_SHA
